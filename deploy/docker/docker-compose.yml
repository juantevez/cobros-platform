# docker-compose.yml — Entorno de desarrollo local
#
# Uso básico (solo infraestructura):
#   docker compose up -d
#
# Con los binarios de la app incluidos:
#   docker compose --profile app up -d
#
# Comandos útiles:
#   docker compose logs -f nats
#   docker compose exec postgres psql -U cobros -d cobros

services:

  # ── Infraestructura ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       cobros
      POSTGRES_USER:     cobros
      POSTGRES_PASSWORD: cobros
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobros -d cobros"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    # JetStream habilitado con persistencia en /data
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # clientes
      - "8222:8222"   # HTTP monitoring: http://localhost:8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── App (profile "app") ───────────────────────────────────────────────────
  # Activos solo con: docker compose --profile app up
  # En desarrollo normal se prefiere: go run ./cmd/api

  api:
    profiles: [app]
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: api
    environment:
      HTTP_ADDR:    ":8080"
      DATABASE_URL: "postgres://cobros:cobros@postgres:5432/cobros?sslmode=disable"
      NATS_URL:     "nats://nats:4222"
      JWT_SECRET:   "${JWT_SECRET:-change-me-in-production-needs-32-chars!!}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  worker:
    profiles: [app]
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: worker
    environment:
      DATABASE_URL:      "postgres://cobros:cobros@postgres:5432/cobros?sslmode=disable"
      NATS_URL:          "nats://nats:4222"
      OUTBOX_INTERVAL:   "1s"
      OUTBOX_BATCH_SIZE: "50"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  postgres_data:
  nats_data:
