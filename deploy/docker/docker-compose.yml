services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cobros
      POSTGRES_USER: cobros
      POSTGRES_PASSWORD: cobros
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobros -d cobros"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    # JetStream habilitado con persistencia en /data
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"   # cliente
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz | grep ok"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nats_data:
